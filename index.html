<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWOLK-CODER | AZ-104 Portal</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --dark-bg: #0a0b10;
            --card-bg: rgba(20, 25, 40, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg);
            background-image: radial-gradient(circle at center, #1a1b25 0%, #0a0b10 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: var(--card-bg);
            border: 1px solid var(--neon-blue);
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            backdrop-filter: blur(10px);
            max-width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        p {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .stats-box {
            display: inline-block;
            padding: 15px 30px;
            border: 2px solid white;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            background: transparent;
            color: white;
            text-transform: uppercase;
        }

        .stats-box:hover {
            background: white;
            color: black;
            box-shadow: 0 0 30px white;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #555;
        }

        /* Анимация ракеты */
        .rocket {
            font-size: 50px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="rocket">🚀</div>
        <h1>SWOLK-CODER</h1>
        <p>ПУТЬ К MICROSOFT AZURE AZ-104</p>
        
        <button class="stats-box" onclick="countDeploys()">
            ДЕПЛОЕВ СЕГОДНЯ: <span id="count">3</span>
        </button>

        <div class="footer">
            Создано полностью с телефона • Деплой через GitHub Actions
        </div>
    </div>

    <script>
        function countDeploys() {
            let count = document.getElementById('count');
            count.innerText = parseInt(count.innerText) + 1;
            alert('Ещё один успешный запуск в облако!');
        }
    </script>
</body>
</html>
